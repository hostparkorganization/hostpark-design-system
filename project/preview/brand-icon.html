<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--background);display:flex;align-items:center;gap:28px;height:160px;padding:0 32px;font-family:var(--font-body)}
.tile{width:96px;height:96px;border-radius:22px;background:#fff;box-shadow:var(--elev-raised);display:flex;align-items:center;justify-content:center}
.tile img{width:64px;height:64px}
.tile.dk{background:#0E1411}
.meta{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:8px}
.c{display:flex;flex-direction:column;align-items:center}
</style></head><body>
<div class="c"><div class="tile"><img src="../assets/hostpark-icon.png"></div><span class="meta">app icon</span></div>
<div class="c"><div class="tile dk"><img src="../assets/hostpark-icon.png"></div><span class="meta">on dark</span></div>
</body></html>
