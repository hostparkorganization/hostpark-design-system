<!DOCTYPE html><html lang="pt-BR" data-theme="dark"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--font-body);background:var(--background);color:var(--foreground);padding:20px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{display:flex;flex-direction:column;gap:8px}
  .chip{width:120px;height:64px;border-radius:var(--radius-md);border:1px solid var(--border)}
  .lab{font-size:12px;line-height:1.3}
  .lab b{display:block;font-weight:600;color:var(--foreground)}
  .lab span{color:var(--muted);font-family:var(--font-mono);font-size:11px}
</style></head><body><div class="row">
<div class="sw"><div class="chip" style="background:var(--background);color:#EAEFEA;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display)">Aa</div><div class="lab"><b>background</b><span>#0E1411</span></div></div>
<div class="sw"><div class="chip" style="background:var(--surface);color:#EAEFEA;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display)">Aa</div><div class="lab"><b>surface</b><span>#161D19</span></div></div>
<div class="sw"><div class="chip" style="background:var(--surface-2);color:#EAEFEA;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display)">Aa</div><div class="lab"><b>surface-2</b><span>#1F2722</span></div></div>
<div class="sw"><div class="chip" style="background:var(--foreground);color:#0E1411;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display)">Aa</div><div class="lab"><b>foreground</b><span>#EAEFEA</span></div></div>
<div class="sw"><div class="chip" style="background:var(--foreground-muted);color:#0E1411;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display)">Aa</div><div class="lab"><b>fg-muted</b><span>#A6AEA7</span></div></div>
<div class="sw"><div class="chip" style="background:var(--border);color:#EAEFEA;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display)">Aa</div><div class="lab"><b>border</b><span>#29322C</span></div></div>
</div></body></html>
