<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.js"></script>
<style>
*{box-sizing:border-box} html,body{margin:0}
body{font-family:var(--font-body);background:#E7EAE8;color:var(--foreground)}
.single{padding:26px;background:var(--background);display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.h4{font-family:var(--font-display);font-weight:700;font-size:18px;margin:0;letter-spacing:-.01em;color:var(--foreground)}
.muted{color:var(--foreground-muted);font-size:14px;line-height:1.5;max-width:300px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:44px;padding:0 20px;border:none;border-radius:var(--radius-md);font-family:var(--font-display);font-weight:600;font-size:15px;cursor:pointer;white-space:nowrap}
.btn-primary{background:var(--primary);color:var(--primary-foreground)}
.btn-secondary{background:var(--surface);color:var(--foreground);border:1px solid var(--border-strong)}
.ic{width:64px;height:64px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;font-size:30px;background:var(--surface-2);color:var(--foreground-muted);margin-bottom:4px}
.ic.bad{background:var(--destructive-subtle);color:var(--destructive)}
.tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
@keyframes shim{0%{background-position:-200px 0}100%{background-position:calc(200px + 100%) 0}}
.sk{border-radius:var(--radius-sm);background:linear-gradient(90deg,var(--surface-2) 25%,color-mix(in srgb,var(--surface-2) 55%,var(--border)) 37%,var(--surface-2) 63%);background-size:200px 100%;animation:shim 1.2s linear infinite}
.spin{width:30px;height:30px;border-radius:50%;border:3px solid var(--surface-2);border-top-color:var(--primary);animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
</style></head><body><div class="single">
  <span class="ic"><ion-icon name="car-outline"></ion-icon></span>
  <span class="h4">Nenhuma vaga por aqui ainda</span>
  <span class="muted">Quando moradores anunciarem vagas no seu condomínio, elas aparecerão aqui.</span>
  <button class="btn btn-primary" style="margin-top:8px">Anunciar minha vaga</button>
</div></body></html>
