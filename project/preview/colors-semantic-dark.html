<!DOCTYPE html><html lang="pt-BR" data-theme="dark"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--font-body);background:var(--background);color:var(--foreground);padding:20px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{display:flex;flex-direction:column;gap:8px}
  .chip{width:120px;height:64px;border-radius:var(--radius-md);border:1px solid var(--border)}
  .lab{font-size:12px;line-height:1.3}
  .lab b{display:block;font-weight:600;color:var(--foreground)}
  .lab span{color:var(--muted);font-family:var(--font-mono);font-size:11px}
</style></head><body><div class="row">
<div class="sw"><div class="chip" style="background:var(--success);color:#05291A;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display)">Aa</div><div class="lab"><b>success</b><span>#4FD98A</span></div></div>
<div class="sw"><div class="chip" style="background:var(--warning);color:#221704;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display)">Aa</div><div class="lab"><b>warning</b><span>#E2A64A</span></div></div>
<div class="sw"><div class="chip" style="background:var(--destructive);color:#2A0E0E;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display)">Aa</div><div class="lab"><b>destructive</b><span>#F0706E</span></div></div>
<div class="sw"><div class="chip" style="background:var(--info);color:#0A1626;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display)">Aa</div><div class="lab"><b>info</b><span>#6BA3F2</span></div></div>
</div></body></html>
