<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://cdn.jsdelivr.net/npm/ionicons@7.4.0/dist/ionicons/ionicons.js"></script>
<style>
*{box-sizing:border-box} html,body{margin:0}
body{font-family:var(--font-body);background:#E7EAE8;color:var(--foreground)}
.stage{padding:22px;background:#E7EAE8;display:flex;gap:18px;justify-content:center}
.surf{position:relative;width:300px;background:var(--background);border-radius:var(--radius-xl);overflow:hidden;border:1px solid rgba(0,0,0,.06)}
.scrim{position:absolute;inset:0;background:rgba(8,16,11,.34)}
.h4{font-family:var(--font-display);font-weight:700;font-size:17px;margin:0;letter-spacing:-.01em;color:var(--foreground)}
.muted{color:var(--foreground-muted);font-size:14px;line-height:1.5}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:46px;padding:0 18px;border:none;border-radius:var(--radius-md);font-family:var(--font-display);font-weight:600;font-size:15px;cursor:pointer;white-space:nowrap}
.btn-primary{background:var(--primary);color:var(--primary-foreground)}
.btn-secondary{background:var(--surface);color:var(--foreground);border:1px solid var(--border-strong)}
.btn-destructive{background:var(--destructive);color:var(--destructive-foreground)}
.btn-block{width:100%}
.tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.opt{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--border);font-size:15px;color:var(--foreground)}
.opt ion-icon{font-size:20px;color:var(--accent)}
</style></head><body><div class="stage"><div><div class="tag" style="margin-bottom:8px">Light</div><div class="surf" data-theme="light" style="height:300px">
  <div class="scrim"></div>
  <div style="position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;box-shadow:var(--elev-floating);overflow:hidden">
    <div style="display:flex;justify-content:center;padding:10px 0 4px"><span style="width:38px;height:4px;border-radius:99px;background:var(--border-strong)"></span></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 18px 12px;border-bottom:1px solid var(--border)">
      <span class="h4">Ações da vaga</span>
      <button style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:22px;display:flex"><ion-icon name="close"></ion-icon></button>
    </div>
    <div class="opt"><ion-icon name="create-outline"></ion-icon>Editar anúncio</div>
    <div class="opt"><ion-icon name="pause-outline"></ion-icon>Pausar temporariamente</div>
    <div class="opt" style="border-bottom:none;color:var(--destructive)"><ion-icon name="trash-outline" style="color:var(--destructive)"></ion-icon>Remover vaga</div>
    <div style="padding:14px 18px 18px;border-top:1px solid var(--border)"><button class="btn btn-primary btn-block">Confirmar</button></div>
  </div>
</div></div><div><div class="tag" style="margin-bottom:8px">Dark</div><div class="surf" data-theme="dark" style="height:300px">
  <div class="scrim"></div>
  <div style="position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;box-shadow:var(--elev-floating);overflow:hidden">
    <div style="display:flex;justify-content:center;padding:10px 0 4px"><span style="width:38px;height:4px;border-radius:99px;background:var(--border-strong)"></span></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 18px 12px;border-bottom:1px solid var(--border)">
      <span class="h4">Ações da vaga</span>
      <button style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:22px;display:flex"><ion-icon name="close"></ion-icon></button>
    </div>
    <div class="opt"><ion-icon name="create-outline"></ion-icon>Editar anúncio</div>
    <div class="opt"><ion-icon name="pause-outline"></ion-icon>Pausar temporariamente</div>
    <div class="opt" style="border-bottom:none;color:var(--destructive)"><ion-icon name="trash-outline" style="color:var(--destructive)"></ion-icon>Remover vaga</div>
    <div style="padding:14px 18px 18px;border-top:1px solid var(--border)"><button class="btn btn-primary btn-block">Confirmar</button></div>
  </div>
</div></div></div></body></html>
