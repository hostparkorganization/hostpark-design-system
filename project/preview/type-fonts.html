<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--font-body);background:var(--background);color:var(--foreground);padding:22px}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
  .line{display:flex;align-items:baseline;gap:16px;padding:5px 0}
  .line .t{font-family:var(--font-display);color:var(--foreground);white-space:nowrap}
  .grid{display:flex;flex-direction:column}
</style></head><body>
<div style="display:flex;flex-direction:column;gap:18px">
  <div>
    <div class="meta">DISPLAY · Hanken Grotesk</div>
    <div style="font-family:var(--font-display);font-weight:800;font-size:34px;letter-spacing:-0.02em;color:var(--foreground)">Condomínio Jardim</div>
  </div>
  <div>
    <div class="meta">BODY · IBM Plex Sans</div>
    <div style="font-family:var(--font-body);font-size:16px;line-height:1.5;color:var(--foreground);max-width:560px">Alugue uma vaga de garagem com vizinhos do seu prédio. Pagamento protegido e moradores verificados.</div>
  </div>
  <div>
    <div class="meta">MONO · IBM Plex Mono</div>
    <div style="font-family:var(--font-mono);font-weight:500;font-size:18px;letter-spacing:0.06em;color:var(--accent)">JARDIM-4827</div>
  </div>
</div></body></html>
