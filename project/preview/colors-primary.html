<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--font-body);background:var(--background);color:var(--foreground);padding:20px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{display:flex;flex-direction:column;gap:8px}
  .chip{width:120px;height:64px;border-radius:var(--radius-md);border:1px solid var(--border)}
  .lab{font-size:12px;line-height:1.3}
  .lab b{display:block;font-weight:600;color:var(--foreground)}
  .lab span{color:var(--muted);font-family:var(--font-mono);font-size:11px}
</style></head><body><div class="row">
<div class="sw"><div class="chip" style="background:var(--primary);color:var(--primary-foreground);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display)">Aa</div><div class="lab"><b>primary</b><span>#55DE85</span></div></div>
<div class="sw"><div class="chip" style="background:var(--primary-hover)"></div><div class="lab"><b>primary-hover</b><span>#43CD75</span></div></div>
<div class="sw"><div class="chip" style="background:var(--primary-subtle)"></div><div class="lab"><b>primary-subtle</b><span>#E4F8EC</span></div></div>
<div class="sw"><div class="chip" style="background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display)">Aa</div><div class="lab"><b>accent</b><span>#1F8A5B</span></div></div>
<div class="sw"><div class="chip" style="background:var(--accent-subtle)"></div><div class="lab"><b>accent-subtle</b><span>#E0F2E9</span></div></div>
</div></body></html>
